root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/wispmail"
  cmd = "go build -o ./tmp/wispmail ./cmd/wispmail"
  delay = 800
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "docs", "deployments", "build", "database", ".git", ".github", "tests", "certs"]
  exclude_file = []
  exclude_regex = ["_test.go", "mock_.*\\.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "./tmp/wispmail --config ./config/config.dev.yaml"
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  include_file = []
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true