run:
  timeout: 15m
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true
  go: "1.26.5"

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters-settings:
  gocyclo:
    min-complexity: 15
  gocognit:
    min-complexity: 25
  goconst:
    min-len: 3
    min-occurrences: 3
  gosec:
    excludes:
      - G104
      - G307
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  revive:
    rules:
      - name: exported
        severity: warning
      - name: error-return
        severity: warning
      - name: error-strings
        severity: warning
      - name: error-naming
        severity: warning
  wrapcheck:
    ignoreSigs:
      - github.com/wispmail/wispmail/internal/domain/shared.NewError
      - github.com/wispmail/wispmail/internal/domain/shared.WrapError
  lll:
    line-length: 140
  funlen:
    lines: 80
    statements: 50
  nestif:
    min-complexity: 5

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - asciicheck
    - bodyclose
    - dogsled
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - gosec
    - misspell
    - nilerr
    - nilnil
    - nolintlint
    - prealloc
    - revive
    - unconvert
    - unparam
    - wastedassign
    - whitespace
    - wrapcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - funlen
        - gocyclo
        - gocognit
        - goconst
        - lll
    - path: tests/mocks/
      linters:
        - gochecknoglobals
    - path: cmd/
      linters:
        - gochecknoglobals