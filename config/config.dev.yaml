env: development
log_level: debug
log_format: console
api:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 60s
  shutdown_timeout: 30s
smtp:
  host: "0.0.0.0"
  port: 2525
  tls_cert: "./certs/localhost.crt"
  tls_key: "./certs/localhost.key"
  max_message_size: 26214400
imap:
  host: "0.0.0.0"
  port: 993
  tls_cert: "./certs/localhost.crt"
  tls_key: "./certs/localhost.key"
pop3:
  host: "0.0.0.0"
  port: 995
  tls_cert: "./certs/localhost.crt"
  tls_key: "./certs/localhost.key"
jmap:
  host: "0.0.0.0"
  port: 443
  tls_cert: "./certs/localhost.crt"
  tls_key: "./certs/localhost.key"
database:
  url: "postgres://wispmail:wispmail@localhost:5432/wispmail?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 30m
  conn_max_idle_time: 5m
redis:
  url: "redis://localhost:6379/0"
  pool_size: 20
  min_idle_conns: 5
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
elasticsearch:
  url: "http://localhost:9200"
  index_prefix: "wispmail"
jwt:
  secret: "dev-secret-change-in-production-use-64-char-random-string"
  access_ttl: 15m
  refresh_ttl: 7d
  issuer: "wispmail"
s3:
  endpoint: "http://localhost:9000"
  region: "us-east-1"
  bucket_name: "wispmail-attachments"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  use_ssl: false
  force_path_style: true
dkim:
  selector: "default"
  domain: "wispmail.local"
  private_key_path: "./certs/dkim_private.pem"
otel:
  exporter_endpoint: "http://localhost:4317"
  service_name: "wispmail"
  service_version: "1.0.0"
metrics:
  path: "/metrics"
  health_path: "/healthz"
  ready_path: "/readyz"
rate_limit:
  enabled: true
  requests_per_minute: 1000
  burst: 50
cors:
  allowed_origins: "http://localhost:3000,http://localhost:5173"
  allowed_methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed_headers: "Authorization,Content-Type,X-Request-ID"
etcd:
  endpoints: "localhost:2379"
  dial_timeout: 5s
cluster:
  name: "wispmail"
  node_id: "node-1"
  bind_addr: "0.0.0.0"
  bind_port: 7946
  advertise_addr: "127.0.0.1"
  advertise_port: 7946
grpc:
  port: 9090
  reflection_enabled: true