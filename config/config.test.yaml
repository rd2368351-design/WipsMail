env: test
log_level: error
log_format: json
api:
  host: "127.0.0.1"
  port: 0
  read_timeout: 5s
  write_timeout: 5s
  shutdown_timeout: 5s
smtp:
  host: "127.0.0.1"
  port: 0
database:
  url: "postgres://wispmail:wispmail_test@localhost:5432/wispmail_test?sslmode=disable"
