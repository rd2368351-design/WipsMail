  - changed-files:
      - any-glob-to-any-file:
          - "**/*_test.go"
          - "tests/**"

"type:docker":
  - changed-files:
      - any-glob-to-any-file:
          - "Dockerfile*"
          - "build/Dockerfile*"
          - "build/docker-compose*.yml"
          - ".dockerignore"

"type:config":
  - changed-files:
      - any-glob-to-any-file:
          - "*.yaml"
          - "*.yml"
          - "*.toml"
          - "*.env*"
          - ".editorconfig"
          - ".gitignore"