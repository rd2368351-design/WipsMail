name: "Wispmail CodeQL Configuration"

disable-default-queries: false

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - .
paths-ignore:
  - "**/*_test.go"
  - "internal/mocks/**"
  - "tests/mocks/**"
  - "vendor/**"
  - "tmp/**"
  - "**/*.pb.go"
  - "**/*.pb.gw.go"
  - "tools/**"