name: Stale Manager

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  stale:
    name: Close Stale Items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 45
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: "This issue has been marked as stale. It will be closed in 14 days."
          stale-pr-message: "This PR has been marked as stale. It will be closed in 7 days."
          close-issue-message: "Closing due to extended inactivity."
          close-pr-message: "Closing due to extended inactivity."
          exempt-issue-labels: "pinned,security,on-roadmap,bug"
          exempt-pr-labels: "pinned,security,in-progress,blocked"
          exempt-all-milestones: true
          exempt-draft-pr: true
          operations-per-run: 100
          remove-stale-when-updated: true
          delete-branch: true