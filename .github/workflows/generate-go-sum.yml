name: Generate go.sum

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          check-latest: true

      - name: Generate go.sum
        run: |
          rm -f go.sum
          go clean -modcache
          go mod tidy
          go mod download
          go mod verify

      - name: Commit go.sum
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add go.sum

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Generate go.sum"
            git push
          fi