name: Auto-Approve Dependabot

on:
  pull_request_target:

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: hmarr/auto-approve-action@v4
        with:
          review-message: "Auto-approved: patch dependency update"
      - uses: ghpr-bot/merge-action@v2
        if: contains(github.event.pull_request.labels.*.name, 'patch')