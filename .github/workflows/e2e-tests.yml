name: E2E Tests

on:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 4 * * *"

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: wispmail_e2e
          POSTGRES_USER: wispmail
          POSTGRES_PASSWORD: wispmail_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - run: make build
      - env:
          DATABASE_URL: postgres://wispmail:wispmail_e2e@localhost:5432/wispmail_e2e?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          WISPMAIL_ENV: test
        run: go test -v -count=1 -tags=e2e ./tests/e2e/...